name: Deploy Linh Luna V4

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v6

      - name: Cai dat Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Cai thu vien
        run: npm ci

      - name: Kiem thu thuat toan
        run: npm test

      - name: Bien dich chuong trinh
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Cau hinh GitHub Pages
        uses: actions/configure-pages@v5

      - name: Tai ban build
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Xuat ban
        id: deployment
        uses: actions/deploy-pages@v4
